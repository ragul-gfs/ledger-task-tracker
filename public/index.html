<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ledger — Task Tracker</title>
<style>
  :root{
    --bg:#1B1F27;
    --panel:#242A34;
    --panel-2:#2C333F;
    --line:#3A4250;
    --ink:#E9E7DF;
    --ink-dim:#9BA3B2;
    --amber:#E8A33D;
    --blue:#5B8FF9;
    --green:#4CB782;
    --red:#E2685B;
    --mono: 'JetBrains Mono', 'Courier New', monospace;
    --sans: 'Inter', 'Segoe UI', system-ui, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    min-height:100vh;
  }
  .app{
    max-width:1100px;
    margin:0 auto;
    padding:32px 24px 60px;
  }
  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    border-bottom:1px solid var(--line);
    padding-bottom:18px;
    margin-bottom:28px;
    flex-wrap:wrap;
    gap:12px;
  }
  .title-block .eyebrow{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.18em;
    color:var(--amber);
    text-transform:uppercase;
    margin:0 0 6px;
  }
  .title-block h1{
    margin:0;
    font-size:30px;
    font-weight:700;
    letter-spacing:-0.01em;
  }
  .today{
    font-family:var(--mono);
    font-size:13px;
    color:var(--ink-dim);
  }
  .view-toggle{
    display:flex;
    gap:2px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:8px;
    padding:3px;
  }
  .view-toggle button{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    background:transparent;
    border:none;
    color:var(--ink-dim);
    padding:8px 16px;
    border-radius:6px;
    cursor:pointer;
    transition:background .15s, color .15s;
  }
  .view-toggle button.active{
    background:var(--panel-2);
    color:var(--ink);
  }

  /* form panel */
  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:20px;
    margin-bottom:28px;
  }
  .panel h2{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--ink-dim);
    margin:0 0 16px;
  }
  .form-grid{
    display:grid;
    grid-template-columns:1.6fr 1fr 1fr 1fr;
    gap:12px;
    margin-bottom:12px;
  }
  .form-grid.notes-row{
    grid-template-columns:1fr;
  }
  label{
    display:block;
    font-size:11px;
    color:var(--ink-dim);
    margin-bottom:5px;
    font-family:var(--mono);
    letter-spacing:0.03em;
  }
  input[type=text], input[type=date], select, textarea{
    width:100%;
    background:var(--bg);
    border:1px solid var(--line);
    color:var(--ink);
    border-radius:6px;
    padding:9px 10px;
    font-family:var(--sans);
    font-size:14px;
  }
  textarea{
    resize:vertical;
    min-height:56px;
    font-family:var(--sans);
  }
  input:focus, select:focus, textarea:focus{
    outline:2px solid var(--blue);
    outline-offset:1px;
  }
  .form-actions{
    display:flex;
    justify-content:flex-end;
    gap:10px;
  }
  button.primary{
    background:var(--blue);
    color:#0e131c;
    border:none;
    font-weight:600;
    padding:10px 20px;
    border-radius:7px;
    cursor:pointer;
    font-size:14px;
  }
  button.primary:hover{ filter:brightness(1.08); }
  button.ghost{
    background:transparent;
    border:1px solid var(--line);
    color:var(--ink-dim);
    padding:10px 16px;
    border-radius:7px;
    cursor:pointer;
    font-size:14px;
  }
  button.ghost:hover{ color:var(--ink); border-color:var(--ink-dim); }

  /* status pill */
  .pill{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.04em;
    text-transform:uppercase;
    padding:4px 9px;
    border-radius:100px;
    white-space:nowrap;
  }
  .pill::before{ content:''; width:6px; height:6px; border-radius:50%; }
  .pill.pending{ background:rgba(232,163,61,0.13); color:var(--amber); }
  .pill.pending::before{ background:var(--amber); }
  .pill.progress{ background:rgba(91,143,249,0.13); color:var(--blue); }
  .pill.progress::before{ background:var(--blue); }
  .pill.done{ background:rgba(76,183,130,0.13); color:var(--green); }
  .pill.done::before{ background:var(--green); }

  /* inline-editable status dropdown, styled to look like a pill */
  .pill-select{
    appearance:none;
    -webkit-appearance:none;
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.04em;
    text-transform:uppercase;
    padding:6px 26px 6px 12px;
    border-radius:100px;
    border:1px solid transparent;
    cursor:pointer;
    background-repeat:no-repeat;
    background-position:right 9px center;
    background-size:9px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 10 6'><path d='M0 0L5 6L10 0' fill='none' stroke='%239BA3B2' stroke-width='1.4'/></svg>");
  }
  .pill-select:hover{ border-color:var(--line); }
  .pill-select:focus{ outline:none; border-color:currentColor; }
  .pill-select.pending{ background-color:rgba(232,163,61,0.13); color:var(--amber); }
  .pill-select.progress{ background-color:rgba(91,143,249,0.13); color:var(--blue); }
  .pill-select.done{ background-color:rgba(76,183,130,0.13); color:var(--green); }
  .pill-select option{ background:var(--panel-2); color:var(--ink); }

  .overdue-badge{
    font-family:var(--mono);
    font-size:10.5px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    color:var(--red);
    border:1px solid var(--red);
    border-radius:100px;
    padding:2px 8px;
  }

  /* time-elapsed progress bar */
  .progress-track{
    height:4px;
    background:var(--bg);
    border-radius:3px;
    overflow:hidden;
    margin-top:8px;
    width:100%;
    max-width:220px;
  }
  .progress-fill{
    height:100%;
    border-radius:3px;
  }
  .progress-fill.pending{ background:var(--amber); }
  .progress-fill.progress{ background:var(--blue); }
  .progress-fill.done{ background:var(--green); }

  /* toasts */
  .toast-container{
    position:fixed;
    bottom:24px;
    right:24px;
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:100;
  }
  .toast{
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:9px;
    padding:12px 16px;
    display:flex;
    align-items:center;
    gap:14px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    font-size:13.5px;
    animation:toastIn .18s ease-out;
    max-width:340px;
  }
  @keyframes toastIn{
    from{ opacity:0; transform:translateY(8px); }
    to{ opacity:1; transform:translateY(0); }
  }
  .toast button{
    font-family:var(--mono);
    font-size:11.5px;
    text-transform:uppercase;
    background:none;
    border:none;
    color:var(--blue);
    cursor:pointer;
    white-space:nowrap;
    padding:0;
  }
  .toast button:hover{ text-decoration:underline; }

  /* keyboard shortcut hints */
  .kbd-hint{
    font-family:var(--mono);
    font-size:10px;
    color:var(--ink-dim);
    border:1px solid var(--line);
    border-radius:4px;
    padding:1px 5px;
    margin-left:6px;
  }

  /* list view */
  .log{
    border-left:2px solid var(--line);
    margin-left:6px;
  }
  .entry{
    position:relative;
    padding:14px 0 14px 26px;
    border-bottom:1px solid var(--line);
  }
  .entry:last-child{ border-bottom:none; }
  .entry::before{
    content:'';
    position:absolute;
    left:-6px;
    top:20px;
    width:10px;
    height:10px;
    border-radius:50%;
    background:var(--panel-2);
    border:2px solid var(--line);
  }
  .entry.pending::before{ border-color:var(--amber); }
  .entry.progress::before{ border-color:var(--blue); }
  .entry.done::before{ border-color:var(--green); }
  .entry-top{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:12px;
    flex-wrap:wrap;
  }
  .entry-name{
    font-size:16px;
    font-weight:600;
  }
  .entry-dates{
    font-family:var(--mono);
    font-size:12px;
    color:var(--ink-dim);
  }
  .entry-notes{
    margin-top:6px;
    font-size:13.5px;
    color:var(--ink-dim);
    line-height:1.5;
    white-space:pre-wrap;
  }
  .entry-actions{
    margin-top:8px;
    display:flex;
    gap:8px;
  }
  .entry-actions button{
    font-family:var(--mono);
    font-size:11px;
    background:transparent;
    border:1px solid var(--line);
    color:var(--ink-dim);
    padding:4px 10px;
    border-radius:5px;
    cursor:pointer;
    text-transform:uppercase;
    letter-spacing:0.04em;
  }
  .entry-actions button:hover{ color:var(--ink); }
  .entry-actions button.delete:hover{ color:var(--red); border-color:var(--red); }

  .empty{
    text-align:center;
    padding:50px 20px;
    color:var(--ink-dim);
    font-family:var(--mono);
    font-size:13px;
  }

  /* calendar view */
  .cal-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:16px;
  }
  .cal-header .month-label{
    font-size:18px;
    font-weight:700;
  }
  .cal-nav{ display:flex; gap:8px; }
  .cal-nav button{
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--ink);
    width:32px; height:32px;
    border-radius:6px;
    cursor:pointer;
    font-size:14px;
  }
  .cal-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:6px;
  }
  .cal-dow{
    font-family:var(--mono);
    font-size:11px;
    color:var(--ink-dim);
    text-align:center;
    text-transform:uppercase;
    letter-spacing:0.05em;
    padding-bottom:4px;
  }
  .cal-grid-dow{
    display:grid;
    grid-template-columns:repeat(7,1fr);
  }
  .cal-dow{
    font-family:var(--mono);
    font-size:11px;
    color:var(--ink-dim);
    text-align:center;
    text-transform:uppercase;
    letter-spacing:0.05em;
    padding-bottom:6px;
  }
  .cal-week{
    position:relative;
    margin-bottom:6px;
  }
  .cal-daycell{
    position:absolute;
    top:0;
    background:var(--panel);
    border:1px solid var(--line);
    box-sizing:border-box;
    cursor:pointer;
    transition:background .12s;
  }
  .cal-daycell:hover{ background:var(--panel-2); }
  .cal-daycell.outside{ opacity:0.4; }
  .cal-daycell.today{ border-color:var(--blue); }
  .cal-daynum{
    font-family:var(--mono);
    font-size:11px;
    color:var(--ink-dim);
    padding:6px 8px 0;
  }
  .cal-bar{
    position:absolute;
    height:20px;
    border-radius:4px;
    font-size:10.5px;
    color:#111;
    font-weight:600;
    display:flex;
    align-items:center;
    padding:0 8px;
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
    cursor:pointer;
    box-sizing:border-box;
    z-index:2;
  }
  .cal-bar.pending{ background:var(--amber); }
  .cal-bar.progress{ background:var(--blue); }
  .cal-bar.done{ background:var(--green); }
  .cal-bar.open-left{ border-top-left-radius:0; border-bottom-left-radius:0; }
  .cal-bar.open-right{ border-top-right-radius:0; border-bottom-right-radius:0; }

  .legend{
    display:flex;
    gap:16px;
    margin-top:16px;
    font-family:var(--mono);
    font-size:11px;
    color:var(--ink-dim);
  }
  .legend span{ display:flex; align-items:center; gap:6px; }
  .legend .dot{ width:8px; height:8px; border-radius:50%; }

  /* quick-add modal */
  .modal-overlay{
    position:fixed;
    top:0; left:0; right:0; bottom:0;
    background:rgba(10,12,16,0.6);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:50;
  }
  .modal-box{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:32px;
    width:640px;
    max-width:94vw;
    max-height:88vh;
    overflow-y:auto;
    box-shadow:0 20px 60px rgba(0,0,0,0.45);
  }
  .modal-box h3{
    margin:0 0 4px;
    font-size:22px;
    font-weight:700;
  }
  .modal-box .modal-subtitle{
    font-size:13px;
    color:var(--ink-dim);
    margin:0 0 22px;
  }
  .modal-box .modal-date{
    font-family:var(--mono);
    font-size:11px;
    color:var(--amber);
    margin-bottom:14px;
  }
  .modal-box label{
    font-size:12px;
    margin-bottom:6px;
  }
  .modal-box input, .modal-box select, .modal-box textarea{
    font-size:14.5px;
    padding:11px 12px;
  }
  .modal-box textarea{ min-height:90px; }
  .modal-field{ margin-bottom:16px; }
  .modal-row{
    display:flex;
    gap:14px;
    margin-bottom:16px;
  }
  .modal-row > div{ flex:1; }
  .modal-actions{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    margin-top:22px;
    padding-top:18px;
    border-top:1px solid var(--line);
  }
  .modal-actions button{
    padding:11px 22px;
    font-size:14px;
  }

  .stats-bar{
    display:flex;
    gap:10px;
    margin-bottom:16px;
    flex-wrap:wrap;
  }
  .stat-chip{
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:9px;
    padding:10px 16px;
    cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .stat-chip:hover{ border-color:var(--ink-dim); }
  .stat-chip.active{ background:var(--panel-2); border-color:currentColor; }
  .stat-chip .stat-dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .stat-chip .stat-num{ font-size:18px; font-weight:700; font-family:var(--mono); }
  .stat-chip .stat-label{ font-size:11px; color:var(--ink-dim); text-transform:uppercase; letter-spacing:0.04em; font-family:var(--mono); }

  .toolbar{
    display:flex;
    align-items:center;
    margin-bottom:14px;
    gap:10px;
    flex-wrap:wrap;
  }
  #searchBox{ flex:1; min-width:180px; }
  .toolbar select, .toolbar input[type=number], .toolbar input[type=month], .toolbar input[type=date]{ width:auto; }
  .toolbar-right{ display:flex; gap:8px; margin-left:auto; }

  /* accordion entry header */
  .entry-header{
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:12px;
    flex-wrap:wrap;
  }
  .entry-header:hover .entry-name{ color:var(--blue); }
  .entry-meta{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    align-items:center;
    margin-top:4px;
  }
  .entry-assigned{
    font-family:var(--mono);
    font-size:11px;
    color:var(--ink-dim);
  }
  .chevron{
    font-family:var(--mono);
    color:var(--ink-dim);
    font-size:12px;
    transition:transform .15s;
    margin-left:8px;
  }
  .entry.expanded .chevron{ transform:rotate(90deg); }
  .entry-body{
    display:none;
    margin-top:10px;
  }
  .entry.expanded .entry-body{ display:block; }

  /* task log entries */
  .task-log{
    margin-top:12px;
    padding-top:10px;
    border-top:1px dashed var(--line);
  }
  .task-log-title{
    font-family:var(--mono);
    font-size:10.5px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--ink-dim);
    margin-bottom:8px;
  }
  .log-entry-item{
    display:flex;
    gap:10px;
    padding:6px 0;
    font-size:13px;
    align-items:flex-start;
  }
  .log-entry-controls{
    display:flex;
    gap:2px;
    flex-shrink:0;
  }
  .log-entry-controls button{
    background:none;
    border:none;
    color:var(--ink-dim);
    cursor:pointer;
    font-size:11px;
    padding:2px 5px;
    border-radius:4px;
  }
  .log-entry-controls button:hover:not(:disabled){ color:var(--ink); background:var(--panel-2); }
  .log-entry-controls button:disabled{ opacity:0.25; cursor:default; }
  .log-entry-date{
    font-family:var(--mono);
    font-size:11px;
    color:var(--amber);
    white-space:nowrap;
    padding-top:1px;
    min-width:78px;
  }
  .log-entry-text{
    color:var(--ink);
    line-height:1.5;
    white-space:pre-wrap;
    flex:1;
  }
  .log-add-row{
    display:flex;
    gap:8px;
    margin-top:8px;
    align-items:flex-start;
  }
  .log-add-row input[type=date]{
    width:130px;
    flex-shrink:0;
  }
  .log-add-row textarea{
    flex:1;
    min-height:38px;
    font-size:13px;
  }
  .log-add-row button{
    font-family:var(--mono);
    font-size:11px;
    text-transform:uppercase;
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--ink);
    padding:8px 14px;
    border-radius:6px;
    cursor:pointer;
    white-space:nowrap;
  }
  .log-add-row button:hover{ border-color:var(--blue); }
  mark{
    background:rgba(232,163,61,0.35);
    color:inherit;
    border-radius:2px;
  }
</style>
</head>
<body>
<div class="toast-container" id="toastContainer"></div>
<div class="app">

  <header>
    <div class="title-block">
      <p class="eyebrow">Personal Work Log</p>
      <h1>Ledger</h1>
    </div>
    <div style="display:flex; flex-direction:column; align-items:flex-end; gap:8px;">
      <div class="today" id="todayLabel"></div>
      <div class="today" id="saveStatus" style="font-size:11px;"></div>
      <div class="view-toggle">
        <button id="btnListView" class="active">List</button>
        <button id="btnCalView">Calendar</button>
      </div>
    </div>
  </header>

  <div id="listView">
    <div class="stats-bar" id="statsBar"></div>
    <div class="toolbar">
      <button class="primary" id="btnCreateTask" style="flex-shrink:0;" title="Shortcut: N">+ Create task</button>
      <input type="text" id="searchBox" placeholder="Search... ( / to focus)">
      <select id="filterStatus">
        <option value="all">All statuses</option>
        <option value="pending">Pending</option>
        <option value="progress">In progress</option>
        <option value="done">Done</option>
      </select>
      <select id="filterPeriodType">
        <option value="all">All time</option>
        <option value="year">By year</option>
        <option value="month">By month</option>
        <option value="day">By exact date</option>
      </select>
      <input type="number" id="filterYear" placeholder="e.g. 2026" style="display:none; width:100px;">
      <input type="month" id="filterMonth" style="display:none; width:150px;">
      <input type="date" id="filterDay" style="display:none; width:150px;">
      <select id="sortOrder">
        <option value="newest">Newest start first</option>
        <option value="oldest">Oldest start first</option>
        <option value="ending-soon">Ending soonest</option>
        <option value="az">Heading A–Z</option>
      </select>
      <div class="toolbar-right">
        <button class="ghost" id="btnExport">Export backup</button>
        <button class="ghost" id="btnImport">Import backup</button>
        <input type="file" id="fileImport" accept=".json" style="display:none;">
      </div>
    </div>
    <div class="log" id="logContainer"></div>
  </div>

  <div id="calView" style="display:none;">
    <div class="cal-header">
      <div class="cal-nav">
        <button id="calPrev">‹</button>
        <button id="calNext">›</button>
      </div>
      <div class="month-label" id="calMonthLabel"></div>
      <button class="ghost" id="calToday">Today</button>
    </div>
    <div class="cal-grid-dow" id="calDow"></div>
    <div id="calWeeks" style="margin-top:6px;"></div>
    <div class="legend">
      <span><span class="dot" style="background:var(--amber)"></span>Pending</span>
      <span><span class="dot" style="background:var(--blue)"></span>In progress</span>
      <span><span class="dot" style="background:var(--green)"></span>Done</span>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay" style="display:none;">
    <div class="modal-box">
      <h3 id="modalTitle">Create task</h3>
      <p class="modal-subtitle" id="modalSubtitle">Fill in the details below.</p>
      <div class="modal-date" id="modalDateLabel"></div>

      <div class="modal-field">
        <label for="m-name">Heading</label>
        <input type="text" id="m-name" placeholder="e.g. Client proposal draft">
      </div>

      <div class="modal-row">
        <div>
          <label for="m-start">Start date</label>
          <input type="date" id="m-start">
        </div>
        <div>
          <label for="m-end">End date</label>
          <input type="date" id="m-end">
        </div>
      </div>

      <div class="modal-row">
        <div>
          <label for="m-assigned">Assigned by</label>
          <input type="text" id="m-assigned" placeholder="e.g. Priya / Self">
        </div>
        <div>
          <label for="m-status">Status</label>
          <select id="m-status">
            <option value="pending">Pending</option>
            <option value="progress" selected>In progress</option>
            <option value="done">Done</option>
          </select>
        </div>
      </div>

      <div class="modal-field">
        <label for="m-description">Description</label>
        <textarea id="m-description" placeholder="What this task is about..."></textarea>
      </div>

      <div class="modal-actions">
        <button class="ghost" id="modalCancel">Cancel</button>
        <button class="primary" id="modalAdd">Create task</button>
      </div>
    </div>
  </div>

</div>

<script>
  const STORAGE_KEY = 'ledger_tasks_v1';
  let tasks = [];
  let calCursor = new Date();
  calCursor.setDate(1);
  let saveTimer = null;

  const $ = id => document.getElementById(id);

  async function loadTasks(){
    try{
      const res = await fetch('/api/data/' + STORAGE_KEY);
      if(res.status === 404){ tasks = []; return; }
      if(!res.ok) throw new Error('load failed');
      const data = await res.json();
      tasks = data.value ? JSON.parse(data.value) : [];
      migrateTasks();
    } catch(err){
      tasks = [];
      setSaveStatus('error', 'Could not load data — check server');
    }
  }

  function migrateTasks(){
    // Bring older saved tasks (name/notes, no log) up to the current shape.
    tasks.forEach(t => {
      if(t.log === undefined) t.log = [];
      if(t.notes && !t.description) t.description = t.notes;
    });
  }

  function save(){
    // debounce so rapid edits don't spam the server
    clearTimeout(saveTimer);
    setSaveStatus('saving');
    saveTimer = setTimeout(doSave, 400);
  }

  async function doSave(){
    try{
      const res = await fetch('/api/data/' + STORAGE_KEY, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ value: JSON.stringify(tasks) })
      });
      setSaveStatus(res.ok ? 'saved' : 'error');
    } catch(err){
      setSaveStatus('error');
    }
  }

  function setSaveStatus(state, message){
    const el = $('saveStatus');
    if(!el) return;
    if(state === 'saving'){ el.textContent = 'Saving…'; el.style.color = 'var(--ink-dim)'; }
    else if(state === 'saved'){ el.textContent = 'Saved'; el.style.color = 'var(--green)'; }
    else { el.textContent = message || 'Save failed — check connection'; el.style.color = 'var(--red)'; }
  }

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

  function fmtDate(d){
    if(!d) return '—';
    const dt = new Date(d + 'T00:00:00');
    return dt.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
  }

  function statusLabel(s){
    return s === 'pending' ? 'Pending' : s === 'done' ? 'Done' : 'In progress';
  }

  function timeProgressPercent(t){
    // Returns null when there's nothing meaningful to show (no range, or a single-day task).
    if(!t.start || !t.end || t.end === t.start) return null;
    if(t.status === 'done') return 100;
    const start = new Date(t.start + 'T00:00:00').getTime();
    const end = new Date(t.end + 'T00:00:00').getTime();
    const now = Date.now();
    if(now <= start) return 0;
    if(now >= end) return 100;
    return Math.round(((now - start) / (end - start)) * 100);
  }

  // ---- Today label ----
  $('todayLabel').textContent = new Date().toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'});

  // ---- Task modal (used for both "Create task" and editing an existing one) ----
  let modalMode = 'create';   // 'create' | 'edit'
  let modalEditId = null;
  let modalPrefillStart = null;
  const expandedIds = new Set();

  function openTaskModal(mode, opts){
    modalMode = mode;
    opts = opts || {};
    if(mode === 'edit'){
      const t = tasks.find(t => t.id === opts.id);
      if(!t) return;
      modalEditId = t.id;
      $('modalTitle').textContent = 'Edit task';
      $('modalSubtitle').textContent = 'Update the details, then save.';
      $('modalDateLabel').textContent = '';
      $('m-name').value = t.name;
      $('m-start').value = t.start;
      $('m-end').value = t.end || '';
      $('m-assigned').value = t.assignedBy || '';
      $('m-status').value = t.status;
      $('m-description').value = t.description || '';
      $('modalAdd').textContent = 'Save changes';
    } else {
      modalEditId = null;
      $('modalTitle').textContent = 'Create task';
      $('modalSubtitle').textContent = 'Fill in the details below.';
      $('modalDateLabel').textContent = '';
      $('m-name').value = '';
      $('m-start').value = opts.prefillStart || toISO(new Date());
      $('m-end').value = opts.prefillStart || '';
      $('m-assigned').value = '';
      $('m-status').value = 'progress';
      $('m-description').value = '';
      $('modalAdd').textContent = 'Create task';
    }
    $('modalOverlay').style.display = 'flex';
    setTimeout(() => $('m-name').focus(), 30);
  }

  function closeTaskModal(){
    $('modalOverlay').style.display = 'none';
    modalEditId = null;
  }

  $('btnCreateTask').addEventListener('click', () => openTaskModal('create'));
  $('modalCancel').addEventListener('click', closeTaskModal);
  $('modalOverlay').addEventListener('click', e => { if(e.target.id === 'modalOverlay') closeTaskModal(); });
  document.addEventListener('keydown', e => {
    if(e.key === 'Escape' && $('modalOverlay').style.display === 'flex'){ closeTaskModal(); return; }

    const tag = (document.activeElement && document.activeElement.tagName) || '';
    const typing = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
    const modalOpen = $('modalOverlay').style.display === 'flex';
    if(modalOpen || typing) return;

    if(e.key === '/'){
      e.preventDefault();
      $('searchBox').focus();
    } else if(e.key === 'n' || e.key === 'N'){
      e.preventDefault();
      openTaskModal('create');
    }
  });

  $('modalAdd').addEventListener('click', () => {
    const name = $('m-name').value.trim();
    const start = $('m-start').value;
    if(!name || !start) return;
    let end = $('m-end').value || start;
    if(end < start) end = start;
    const assignedBy = $('m-assigned').value.trim();
    const status = $('m-status').value;
    const description = $('m-description').value.trim();

    if(modalMode === 'edit' && modalEditId){
      const t = tasks.find(t => t.id === modalEditId);
      Object.assign(t, {name, start, end, assignedBy, status, description});
      save();
      closeTaskModal();
      renderAll();
      showToast(`Saved changes to "${name}".`);
    } else {
      const id = uid();
      tasks.push({id, name, start, end, assignedBy, status, description, log: []});
      expandedIds.add(id); // open it right away so they can start logging
      save();
      closeTaskModal();
      renderAll();
      showToast(`Created "${name}".`);
    }
  });

  function editTask(id){ openTaskModal('edit', { id }); }

  function updateTaskStatus(id, newStatus){
    const t = tasks.find(t => t.id === id);
    if(!t) return;
    t.status = newStatus;
    save();
    renderAll();
    showToast(`Marked "${t.name}" as ${statusLabel(newStatus).toLowerCase()}.`);
  }

  // ---- Toasts ----
  function showToast(message, actionLabel, actionFn, duration){
    const container = $('toastContainer');
    const el = document.createElement('div');
    el.className = 'toast';
    const msgSpan = document.createElement('span');
    msgSpan.textContent = message;
    el.appendChild(msgSpan);
    if(actionLabel && actionFn){
      const btn = document.createElement('button');
      btn.textContent = actionLabel;
      btn.onclick = () => { actionFn(); el.remove(); };
      el.appendChild(btn);
    }
    container.appendChild(el);
    setTimeout(() => { el.remove(); }, duration || 5000);
  }

  function deleteTask(id){
    const idx = tasks.findIndex(t => t.id === id);
    if(idx === -1) return;
    const [removed] = tasks.splice(idx, 1);
    expandedIds.delete(id);
    save();
    renderAll();
    showToast(`Deleted "${removed.name}".`, 'Undo', () => {
      tasks.splice(idx, 0, removed);
      save();
      renderAll();
    }, 6000);
  }

  function duplicateTask(id){
    const t = tasks.find(t => t.id === id);
    if(!t) return;
    const copy = {
      ...JSON.parse(JSON.stringify(t)),
      id: uid(),
      name: t.name + ' (copy)',
      log: []
    };
    const idx = tasks.findIndex(x => x.id === id);
    tasks.splice(idx + 1, 0, copy);
    expandedIds.add(copy.id);
    save();
    renderAll();
    showToast(`Duplicated as "${copy.name}".`);
  }

  function toggleExpand(id){
    if(expandedIds.has(id)) expandedIds.delete(id);
    else expandedIds.add(id);
    renderList();
  }

  function addLogEntry(taskId, dateVal, textVal){
    const t = tasks.find(t => t.id === taskId);
    if(!t) return;
    const text = (textVal || '').trim();
    if(!text) return;
    if(!t.log) t.log = [];
    t.log.unshift({ id: uid(), date: dateVal || toISO(new Date()), text }); // newest lands on top by default
    save();
    renderAll();
  }

  function deleteLogEntry(taskId, entryId){
    const t = tasks.find(t => t.id === taskId);
    if(!t || !t.log) return;
    t.log = t.log.filter(e => e.id !== entryId);
    save();
    renderAll();
  }

  function moveLogEntry(taskId, entryId, direction){
    const t = tasks.find(t => t.id === taskId);
    if(!t || !t.log) return;
    const idx = t.log.findIndex(e => e.id === entryId);
    if(idx === -1) return;
    const newIdx = idx + direction;
    if(newIdx < 0 || newIdx >= t.log.length) return; // already at the edge
    const [entry] = t.log.splice(idx, 1);
    t.log.splice(newIdx, 0, entry);
    save();
    renderAll();
  }

  // ---- List view ----
  function taskMatchesSearch(t, q){
    if(!q) return true;
    const hay = [
      t.name || '',
      t.description || '',
      t.assignedBy || '',
      ...(t.log || []).map(e => e.text)
    ].join(' ').toLowerCase();
    return hay.includes(q.toLowerCase());
  }

  function taskMatchesPeriod(t){
    const type = $('filterPeriodType').value;
    if(type === 'all') return true;
    const s = t.start;
    const e = t.end || t.start;
    if(!s) return false;
    if(type === 'year'){
      const y = $('filterYear').value;
      if(!y) return true;
      return s.slice(0,4) <= y && e.slice(0,4) >= y;
    }
    if(type === 'month'){
      const m = $('filterMonth').value; // "YYYY-MM"
      if(!m) return true;
      return s.slice(0,7) <= m && e.slice(0,7) >= m;
    }
    if(type === 'day'){
      const d = $('filterDay').value;
      if(!d) return true;
      return s <= d && e >= d;
    }
    return true;
  }

  function highlight(text, q){
    if(!q) return escapeHtml(text);
    const escaped = escapeHtml(text);
    const escapedQ = escapeHtml(q).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return escaped.replace(new RegExp(escapedQ, 'ig'), match => `<mark>${match}</mark>`);
  }

  function getBaseFilteredTasks(){
    // "base" = filtered by search + period, but NOT by status —
    // so the stat chips can show what each status would total within the current period/search.
    const query = ($('searchBox').value || '').trim();
    let items = [...tasks];
    if(query) items = items.filter(t => taskMatchesSearch(t, query));
    items = items.filter(taskMatchesPeriod);
    return items;
  }

  function renderStatsBar(){
    const base = getBaseFilteredTasks();
    const counts = { all: base.length, pending: 0, progress: 0, done: 0 };
    base.forEach(t => { if(counts[t.status] !== undefined) counts[t.status]++; });
    const current = $('filterStatus').value;
    const chips = [
      { key: 'all', label: 'All tasks', color: 'var(--ink-dim)' },
      { key: 'pending', label: 'Pending', color: 'var(--amber)' },
      { key: 'progress', label: 'In progress', color: 'var(--blue)' },
      { key: 'done', label: 'Done', color: 'var(--green)' },
    ];
    $('statsBar').innerHTML = chips.map(c => `
      <div class="stat-chip ${current === c.key ? 'active' : ''}" style="color:${c.color}" onclick="setStatusFilter('${c.key}')">
        <span class="stat-dot" style="background:${c.color}"></span>
        <span class="stat-num">${counts[c.key]}</span>
        <span class="stat-label">${c.label}</span>
      </div>
    `).join('');
  }

  function setStatusFilter(key){
    $('filterStatus').value = key;
    renderList();
  }

  function sortItems(items, order){
    const byStart = (a,b) => (a.start || '').localeCompare(b.start || '');
    if(order === 'oldest') return items.sort(byStart);
    if(order === 'ending-soon') return items.sort((a,b) => (a.end || a.start || '').localeCompare(b.end || b.start || ''));
    if(order === 'az') return items.sort((a,b) => (a.name || '').localeCompare(b.name || ''));
    return items.sort((a,b) => -byStart(a,b)); // newest start first (default)
  }

  function renderList(){
    renderStatsBar();
    const filter = $('filterStatus').value;
    const sortOrder = $('sortOrder').value;
    const container = $('logContainer');
    let items = getBaseFilteredTasks();
    if(filter !== 'all') items = items.filter(t => t.status === filter);
    items = sortItems(items, sortOrder);
    const query = ($('searchBox').value || '').trim();

    if(items.length === 0){
      container.innerHTML = `<div class="empty">${query || filter !== 'all' ? 'No tasks match.' : 'No tasks yet — click "+ Create task" to add one.'}</div>`;
      return;
    }

    container.innerHTML = items.map(t => {
      const isOpen = expandedIds.has(t.id);
      const log = t.log || []; // manual order, as stored — not re-sorted by date
      const logHtml = log.map((e, idx) => `
        <div class="log-entry-item">
          <div class="log-entry-date">${fmtDate(e.date)}</div>
          <div class="log-entry-text">${highlight(e.text, query)}</div>
          <div class="log-entry-controls">
            <button onclick="event.stopPropagation(); moveLogEntry('${t.id}','${e.id}',-1)" ${idx === 0 ? 'disabled' : ''} title="Move up">▲</button>
            <button onclick="event.stopPropagation(); moveLogEntry('${t.id}','${e.id}',1)" ${idx === log.length-1 ? 'disabled' : ''} title="Move down">▼</button>
            <button onclick="event.stopPropagation(); deleteLogEntry('${t.id}','${e.id}')" title="Delete entry">✕</button>
          </div>
        </div>
      `).join('');

      const overdue = t.end && t.end < toISO(new Date()) && t.status !== 'done';
      const progressPct = timeProgressPercent(t);

      return `
      <div class="entry ${t.status} ${isOpen ? 'expanded' : ''}">
        <div class="entry-header entry-top" onclick="toggleExpand('${t.id}')">
          <div style="flex:1;">
            <div class="entry-name">${highlight(t.name, query)}</div>
            <div class="entry-meta">
              <span class="entry-dates">${fmtDate(t.start)} → ${fmtDate(t.end)}</span>
              ${t.assignedBy ? `<span class="entry-assigned">Assigned by: ${highlight(t.assignedBy, query)}</span>` : ''}
              ${overdue ? `<span class="overdue-badge">Overdue</span>` : ''}
            </div>
            ${progressPct !== null ? `<div class="progress-track"><div class="progress-fill ${t.status}" style="width:${progressPct}%"></div></div>` : ''}
          </div>
          <div style="display:flex; align-items:center;" onclick="event.stopPropagation()">
            <select class="status-select pill-select ${t.status}" onchange="updateTaskStatus('${t.id}', this.value)">
              <option value="pending" ${t.status==='pending'?'selected':''}>Pending</option>
              <option value="progress" ${t.status==='progress'?'selected':''}>In progress</option>
              <option value="done" ${t.status==='done'?'selected':''}>Done</option>
            </select>
            <span class="chevron">▶</span>
          </div>
        </div>
        <div class="entry-body">
          ${t.description ? `<div class="entry-notes">${highlight(t.description, query)}</div>` : ''}
          <div class="entry-actions">
            <button onclick="event.stopPropagation(); editTask('${t.id}')">Edit</button>
            <button onclick="event.stopPropagation(); duplicateTask('${t.id}')">Duplicate</button>
            <button class="delete" onclick="event.stopPropagation(); deleteTask('${t.id}')">Delete</button>
          </div>
          <div class="task-log" onclick="event.stopPropagation()">
            <div class="task-log-title">Task log</div>
            ${logHtml || '<div style="color:var(--ink-dim); font-size:12.5px;">No updates logged yet.</div>'}
            <div class="log-add-row">
              <input type="date" id="log-date-${t.id}" value="${toISO(new Date())}">
              <textarea id="log-text-${t.id}" placeholder="What did you do today?" rows="1"></textarea>
              <button onclick="submitLogEntry('${t.id}')">Add entry</button>
            </div>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function submitLogEntry(taskId){
    const dateVal = $('log-date-' + taskId).value;
    const textVal = $('log-text-' + taskId).value;
    addLogEntry(taskId, dateVal, textVal);
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  $('filterStatus').addEventListener('change', renderList);
  $('searchBox').addEventListener('input', renderList);
  $('sortOrder').addEventListener('change', renderList);

  $('filterPeriodType').addEventListener('change', () => {
    const type = $('filterPeriodType').value;
    $('filterYear').style.display = type === 'year' ? '' : 'none';
    $('filterMonth').style.display = type === 'month' ? '' : 'none';
    $('filterDay').style.display = type === 'day' ? '' : 'none';
    if(type === 'year' && !$('filterYear').value) $('filterYear').value = new Date().getFullYear();
    if(type === 'month' && !$('filterMonth').value) $('filterMonth').value = new Date().toISOString().slice(0,7);
    if(type === 'day' && !$('filterDay').value) $('filterDay').value = toISO(new Date());
    renderList();
  });
  $('filterYear').addEventListener('input', renderList);
  $('filterMonth').addEventListener('input', renderList);
  $('filterDay').addEventListener('input', renderList);

  // ---- Export / Import ----
  $('btnExport').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(tasks, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'ledger-backup-' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
  });

  $('btnImport').addEventListener('click', () => $('fileImport').click());
  $('fileImport').addEventListener('change', e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
      try{
        const imported = JSON.parse(evt.target.result);
        if(Array.isArray(imported)){
          tasks = imported;
          save();
          renderAll();
        }
      } catch(err){
        alert('Could not read that file. Make sure it is a Ledger backup JSON file.');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  // ---- View toggle ----
  $('btnListView').addEventListener('click', () => switchView('list'));
  $('btnCalView').addEventListener('click', () => switchView('cal'));
  function switchView(view){
    $('listView').style.display = view === 'list' ? '' : 'none';
    $('calView').style.display = view === 'cal' ? '' : 'none';
    $('btnListView').classList.toggle('active', view === 'list');
    $('btnCalView').classList.toggle('active', view === 'cal');
    if(view === 'cal') renderCalendar();
  }

  // ---- Calendar view ----
  const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  $('calDow').innerHTML = DOW.map(d => `<div class="cal-dow">${d}</div>`).join('');

  const DAY_MS = 86400000;
  const HEADER_H = 26;   // space reserved for the day number
  const BAR_H = 22;      // height of each bar row (bar + gap)
  const CELL_PAD_BOTTOM = 8;

  function toISO(d){
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function parseISO(iso){ return new Date(iso + 'T00:00:00'); }
  function diffDays(a,b){ return Math.round((b - a) / DAY_MS); }

  function computeWeekLayout(weekDates){
    const weekStartIso = toISO(weekDates[0]);
    const weekEndIso = toISO(weekDates[6]);
    const relevant = tasks
      .filter(t => t.start && (t.end || t.start) >= weekStartIso && t.start <= weekEndIso)
      .sort((a,b) => (a.start||'').localeCompare(b.start||''));

    const lanes = [];
    const segments = [];
    relevant.forEach(t => {
      const s = t.start;
      const e = t.end || t.start;
      const startCol = Math.max(0, diffDays(weekDates[0], parseISO(s)));
      const endCol = Math.min(6, diffDays(weekDates[0], parseISO(e)));
      let laneIdx = 0;
      while(lanes[laneIdx] && lanes[laneIdx].some(iv => !(endCol < iv.startCol || startCol > iv.endCol))) laneIdx++;
      if(!lanes[laneIdx]) lanes[laneIdx] = [];
      lanes[laneIdx].push({startCol, endCol});
      segments.push({
        task: t, startCol, endCol, lane: laneIdx,
        openLeft: s < weekStartIso,
        openRight: e > weekEndIso
      });
    });
    return { segments, laneCount: lanes.length };
  }

  function renderCalendar(){
    const year = calCursor.getFullYear();
    const month = calCursor.getMonth();
    $('calMonthLabel').textContent = calCursor.toLocaleDateString('en-US', {month:'long', year:'numeric'});

    const firstDay = new Date(year, month, 1);
    const startOffset = firstDay.getDay();
    const gridStart = new Date(year, month, 1 - startOffset);
    const todayIso = toISO(new Date());
    const colWidthPct = 100/7;

    let weeksHtml = '';
    for(let w=0; w<6; w++){
      const weekDates = [];
      for(let d=0; d<7; d++){
        const dt = new Date(gridStart);
        dt.setDate(gridStart.getDate() + w*7 + d);
        weekDates.push(dt);
      }
      const { segments, laneCount } = computeWeekLayout(weekDates);
      const weekHeight = HEADER_H + Math.max(laneCount,1)*BAR_H + CELL_PAD_BOTTOM;

      let cellsHtml = '';
      weekDates.forEach((dt, idx) => {
        const iso = toISO(dt);
        const outside = dt.getMonth() !== month;
        const isToday = iso === todayIso;
        cellsHtml += `<div class="cal-daycell ${outside ? 'outside':''} ${isToday ? 'today':''}"
          style="left:${idx*colWidthPct}%; width:${colWidthPct}%; height:${weekHeight}px;"
          onclick="openQuickAdd('${iso}')">
          <div class="cal-daynum">${dt.getDate()}</div>
        </div>`;
      });

      let barsHtml = '';
      segments.forEach(seg => {
        const left = seg.startCol*colWidthPct;
        const width = (seg.endCol - seg.startCol + 1)*colWidthPct;
        const top = HEADER_H + seg.lane*BAR_H;
        barsHtml += `<div class="cal-bar ${seg.task.status} ${seg.openLeft?'open-left':''} ${seg.openRight?'open-right':''}"
          style="left:${left}%; width:${width}%; top:${top}px;"
          title="${escapeHtml(seg.task.name)}"
          onclick="event.stopPropagation(); editTask('${seg.task.id}')">${escapeHtml(seg.task.name)}</div>`;
      });

      weeksHtml += `<div class="cal-week" style="height:${weekHeight}px;">${cellsHtml}${barsHtml}</div>`;
    }
    $('calWeeks').innerHTML = weeksHtml;
  }

  $('calPrev').addEventListener('click', () => { calCursor.setMonth(calCursor.getMonth()-1); renderCalendar(); });
  $('calNext').addEventListener('click', () => { calCursor.setMonth(calCursor.getMonth()+1); renderCalendar(); });
  $('calToday').addEventListener('click', () => { calCursor = new Date(); calCursor.setDate(1); renderCalendar(); });

  function openQuickAdd(iso){
    openTaskModal('create', { prefillStart: iso });
  }

  function renderAll(){
    renderList();
    if($('calView').style.display !== 'none') renderCalendar();
  }

  async function init(){
    $('logContainer').innerHTML = '<div class="empty">Loading your saved tasks…</div>';
    await loadTasks();
    renderAll();
  }

  init();
</script>
</body>
</html>
